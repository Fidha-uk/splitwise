# /etc/nginx/sites-available/splitwise
# Place this file and symlink:
#   sudo ln -s /etc/nginx/sites-available/splitwise /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Redirect HTTP → HTTPS (uncomment once cert is installed)
    # return 301 https://$host$request_uri;

    client_max_body_size 15M;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location /uploads/ {
        alias /var/www/splitwise/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }
}

